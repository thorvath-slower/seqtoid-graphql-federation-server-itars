name: security

# Security scanning suite for the Node/TypeScript GraphQL federation server
# (ITARS, CZID-260). Mirrors the refactor-line suite (CZID-137 / improvement-#010,
# CZID-98 pins). Self-contained: GitHub-hosted ubuntu-latest, no customer infra.
#   - gitleaks  : secrets across git history — HARD-FAIL (FPs → .gitleaks.toml)
#   - trivy     : deps/CVE + Dockerfile misconfig + secret (fs) — REPORT-ONLY
#   - codeql    : JavaScript/TypeScript SAST — results to the Security tab
#   - npm-audit : dependency advisories — REPORT-ONLY

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (secrets, hard-fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VER=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - name: Scan git history for secrets
        # CLI binary (MIT) — honors .gitleaks.toml (fixture FP allowlist).
        run: gitleaks git . --redact --no-banner --exit-code 1

  trivy:
    name: trivy fs (vuln/misconfig/secret, report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0 # TODO(CZID-260): ratchet to 1 once the backlog is triaged

  codeql:
    name: CodeQL (JS/TS SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  npm-audit:
    name: npm audit (advisories, report only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - name: npm audit (production dependencies)
        run: npm audit --omit=dev
        continue-on-error: true
