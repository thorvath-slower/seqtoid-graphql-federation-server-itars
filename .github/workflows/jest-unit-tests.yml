name: Jest unit tests
on:
  # CZID-241 (ITARS detach): auto-trigger disabled — ran on a self-hosted ARM64 runner
  # (docker swarm + czidnet). Manual-only until re-platformed to a hosted runner.
  workflow_dispatch:

jobs:
  jest-unit-tests:
    runs-on: ARM64
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev
      - name: Build Docker image
        run: |
          make build
      - name: Create Docker network
        run: |
          docker swarm init
          docker network create czidnet --attachable --driver overlay
      - name: Run tests in Docker container
        run: |
          make test
