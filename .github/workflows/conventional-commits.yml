name: Ensure all PRs have conventional commit titles
on:
  # CZID-241 (ITARS detach): PR trigger disabled — used chanzuckerberg/github-actions
  # (a customer-maintained action). Manual-only until replaced with an owner-local check.
  workflow_dispatch:

jobs:
  conventional_commit_title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
