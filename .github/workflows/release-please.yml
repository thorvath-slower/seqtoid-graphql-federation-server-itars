on:
  # CZID-241 (ITARS detach): push(main) trigger disabled — used chanzuckerberg/github-app-token
  # + CZI release-please app secrets. Manual-only until repointed to an owner app/token.
  workflow_dispatch:

name: release-please
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate_token
        uses: chanzuckerberg/github-app-token@v1.1.4
        with:
          app_id: ${{ secrets.CZI_RELEASE_PLEASE_APP_ID }}
          private_key: ${{ secrets.CZI_RELEASE_PLEASE_PK }}
      - name: release please
        uses: google-github-actions/release-please-action@v3.7.11
        id: release
        with:
          release-type: node
          token: ${{ steps.generate_token.outputs.token }}
          bump-minor-pre-major: true
